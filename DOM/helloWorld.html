<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        function saudacao() {
            alert(`Titulo: ${document.getElementById('titulo').textContent}`);
        }
        function mouseMoveu (){
            alert("Mouse se movou no botão");
        }
        function clicouBaixo() {
            alert("Mouse se moveu no botão");
        }
        function soltaBotao() {
            alert("Você soltou o botão do mouse");
        }
        function duploClique() {
            alert("Você clicou duas vezes");
        }
    </script>
</head>
<body>
    <h1 id="titulo">Olá, eu sou o título da página</h1>
    <button onclick="saudacao();">Clique Aqui</button> <br>
    <button onmousedown="clicouBaixo();">Segura o click</button> <br>
    <button onmouseup="soltaBotao();">Solta o botão</button> <br>
    <button ondblclick="duploClique();">Clica duas vezes</button> <br>
</body>
</html>
