<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Bem Vindo</h1>
    <div>
        <span id="spn-nome"></span>
        <span id="spn-sobrenome"></span>
    </div>
    <input type="text" id="nome" placeholder="Digite seu nome" onblur="criarSobrenome();" onkeypress="replicaNome(this.value);" onkeypress="replicaSobrenome(this.value);"/>

    <script>
        let criouSobrenome = false;

        function replicaNome(nome) {
            document.getElementById('spn-nome').textContent = nome;
        }
        function replicaSobrenome(sobrenome) {
            document.getElementById('spn-sobrenome').textContent = sobrenome;
        }

        function criarSobrenome() {
           if (!criouSobrenome) {
               document.body.innerHTML += `<input type="text" id="nome" placeholder="Digite seu Sobrenome"> `;

               criouSobrenome = true;
            }
        }
        
        function trocaTitulo(){
            const novoTitulo = prompt("Digite um novo título");

            document.head.title = `Página do ${novoTitulo}`;
            document.body.innerHTML += `<h2>Página do ${novoTitulo}</h2>`; // innerHTML é o html interno da página
        }
    </script>
</body>
</html>
