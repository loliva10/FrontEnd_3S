<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header>
        <div class="container container-flex">
            <img src="./images/driver.svg.svg" alt="imagem de um usuário ilustrativo"
                class="form-header_image-perfil" />
            <h1 class="form-header_contact-form">Contact Form</h1>
            <p class="form-header_text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form class="form-contact" action="">
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Nome</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-metade" type="text" id="nome" name="nome" placeholder="Nome">
                        <input class="form-contact_input form-contact_input-metade" type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Email</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-inteiro" type="text" id="email" name="email" placeholder="Email">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Telefone</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="DDI" name="DDI" placeholder="DDI">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="DDD" name="DDD" placeholder="DDD">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="Número" name="Número" placeholder="Número">
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer>
        Todos os direitos reservados
    </footer>
</body>
</html>
