<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header>
        <div class="container container-flex">
            <img src="./images/driver.svg.svg" alt="imagem de um usuário ilustrativo"
                class="form-header_image-perfil" />
            <h1 class="form-header_contact-form">Contact Form</h1>
            <p class="form-header_text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form class="form-contact" onsubmit="validarFormulario(event)">
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Nome</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-metade" type="text" id="nome" name="nome"
                            placeholder="Nome">
                        <input class="form-contact_input form-contact_input-metade" type="text" id="sobrenome"
                            name="sobrenome" placeholder="Sobrenome">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Email</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-inteiro" type="text" id="email" name="email"
                            placeholder="Email">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Telefone</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="ddi" name="DDI"
                            placeholder="DDI">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="ddd" name="DDD"
                            placeholder="DDD">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="numero" name="Número"
                            placeholder="Número">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Endereço</label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-quarto" type="text" id="cep" name="Cep"
                            placeholder="Cep">
                        <input class="form-contact_input form-contact_input-metade" type="text" id="rua" name="Rua"
                            placeholder="Rua">
                        <input class="form-contact_input form-contact_input-quarto" type="text" id="bloco"
                            name="Bloco" placeholder="Bloco">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for=""></label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="estado" name="Estado"
                            placeholder="Estado">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="cidade" name="Cidade"
                            placeholder="Cidade">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="bairro" name="Bairro"
                            placeholder="Bairro">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for=""></label>
                    </div>
                    <div class="form-contact_col-b">
                        <input class="form-contact_input form-contact_input-terco" type="text" id="complemento"
                            name="Complemento" placeholder="Complemento">
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a">
                        <label class="form-contact_label" for="">Anotações</label>
                    </div>
                    <div class="form-contact_col-b">
                        <textarea class="form-contact_input form-contact_textarea" id="anotacoes" name="Anotacoes"
                            placeholder="Suas anotações aqui"></textarea>
                    </div>
                </div>
                <div class="form-contact_linha">
                    <div class="form-contact_col-a"></div>
                    <div class="form-contact_col-b-botoes">
                        <button /*onclick="validarFormulario()"*/ type="submit">Cadastrar</button>
                        <button type="reset">Limpar</button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer class="form-contact_footer">
        Todos os direitos reservados
    </footer>
    <section class="cadastros">
        <article class="cadastro">

        </article>
    </section>
    <script src="./js/script.js"></script>
</body>

</html>
